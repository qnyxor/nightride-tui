name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets --features test-export -- -D warnings

      - name: test
        run: cargo test --all --features test-export

      - name: Install cargo-audit
        if: runner.os != 'Windows'
        run: cargo install cargo-audit --locked

      - name: audit
        if: runner.os != 'Windows'
        run: cargo audit --deny warnings
        continue-on-error: true

      # Windows-only: produce a release `.exe` and upload it as a
      # GitHub Actions artifact so the operator can validate the
      # binary on real Windows hardware without installing the MSVC
      # toolchain locally. Artifacts are only downloadable by users
      # with `read` access to the repo and expire after 14 days. They
      # do NOT produce a public release, tag, or version bump.
      - name: Build release binary (artifact)
        if: runner.os == 'Windows'
        run: cargo build --release

      - name: Upload Windows binary artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: nightride-tui-windows-x86_64-msvc
          path: target/release/nightride-tui.exe
          if-no-files-found: error
          retention-days: 14
